name: Unlighthouse CI 性能审计

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建生产环境产物
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: 启动本地预览服务 (使用 serve 托管)
        # 直接指定 VitePress 的输出目录，彻底解决找不到 dist 的问题
        run: npx serve docs/.vitepress/dist -l 4173 &

      - name: 等待服务就绪
        run: npx wait-on tcp:4173

      - name: 执行 Unlighthouse 极速扫描
        run: |
          npx unlighthouse@latest --site http://localhost:4173/ \
          --build-static \
          --no-throttle \
          --desktop \
          --ci

      - name: 归档跑分报告
        uses: actions/upload-artifact@v4
        with:
          name: unlighthouse-report
          path: .unlighthouse
          retention-days: 7