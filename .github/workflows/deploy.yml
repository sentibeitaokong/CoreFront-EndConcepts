# 构建 VitePress 站点并将其部署到 GitHub Pages 的示例工作流程
#
name: Deploy VitePress site to Pages

on:
  # 在针对 `main` 分支的推送上运行。如果你
  # 使用 `master` 分支作为默认分支，请将其更改为 `master`
  push:
    branches: [main]
    paths-ignore:
      - '.changeset/**'
      - 'packages/xbElement/package.json'
      - 'packages/xbElement/CHANGELOG.md'
      - 'package.json'
      - 'pnpm-lock.yaml'

  # 允许从 Actions 选项卡手动运行此工作流程
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
# 但是，不要取消正在进行的运行，因为希望允许这些生产部署完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 如果未启用 lastUpdated，则不需要

      # 在配置 Node 环境之前，必须先安装并锁定 pnpm 大版本
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 生产环境建议使用更稳定的 LTS 版本（如 20），也可以保持 24
          cache: pnpm      # 将依赖缓存机制明确指定为 pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 严禁使用 npm ci，改用 pnpm 的全量锁定安装命令
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 调用工作区配置好的 turbo 调度命令进行极速构建
      # 新增 Sentry 注入：在这里配置 env 环境变量
      - name: Build with VitePress
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_UPLOAD: "true"
          #  告诉 Node 尽情使用内存，限制在 6GB 左右，防止把 GitHub Runner 彻底卡死
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: pnpm run docs:build

#      - name: Start preview server
#        run: pnpm run docs:preview:ci > /tmp/vitepress-preview.log 2>&1 &
#
#      - name: Wait for preview server
#        run: |
#          for i in {1..30}; do
#            if curl -fsS http://127.0.0.1:4173/CoreFront-EndConcepts/ > /dev/null; then
#              exit 0
#            fi
#            sleep 2
#          done
#          cat /tmp/vitepress-preview.log
#          exit 1
#
#      - name: Run Unlighthouse performance gate
#        continue-on-error: true
#        run: pnpm run monitor:lh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
